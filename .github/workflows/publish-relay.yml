name: Publish Relay Server

on:
    push:
        branches:
            - main
        tags:
            - "relay-v*"

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository_owner }}/perihelion-relay

jobs:
    build-and-push:
        name: Build & Push (${{ matrix.platform }})
        runs-on: ${{ matrix.runner }}
        permissions:
            contents: read
            packages: write

        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: linux/amd64
                      runner: ubuntu-latest
                    - platform: linux/arm64
                      runner: ubuntu-24.04-arm

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      # push to main → :edge
                      type=edge,branch=main
                      # tag relay-v1.2.3 → :1.2.3, :1.2, :1, :latest
                      type=match,pattern=relay-v(\d+\.\d+\.\d+),group=1
                      type=match,pattern=relay-v(\d+\.\d+),group=1
                      type=match,pattern=relay-v(\d+),group=1
                      type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/relay-v') }}

            - name: Build and push by digest
              id: build
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile.relay
                  platforms: ${{ matrix.platform }}
                  labels: ${{ steps.meta.outputs.labels }}
                  outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
                  cache-from: type=gha,scope=${{ matrix.platform }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

            - name: Export digest
              run: |
                  mkdir -p /tmp/digests
                  digest="${{ steps.build.outputs.digest }}"
                  touch "/tmp/digests/${digest#sha256:}"

            - name: Upload digest artifact
              uses: actions/upload-artifact@v4
              with:
                  name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
                  path: /tmp/digests/*
                  if-no-files-found: error
                  retention-days: 1

    merge-manifests:
        name: Merge Multi-Arch Manifests
        runs-on: ubuntu-latest
        needs: build-and-push
        permissions:
            contents: read
            packages: write

        steps:
            - name: Download digests
              uses: actions/download-artifact@v4
              with:
                  path: /tmp/digests
                  pattern: digests-*
                  merge-multiple: true

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=edge,branch=main
                      type=match,pattern=relay-v(\d+\.\d+\.\d+),group=1
                      type=match,pattern=relay-v(\d+\.\d+),group=1
                      type=match,pattern=relay-v(\d+),group=1
                      type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/relay-v') }}

            - name: Create and push multi-arch manifest
              working-directory: /tmp/digests
              run: |
                  docker buildx imagetools create \
                    $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
                    $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

            - name: Inspect manifest
              run: |
                  docker buildx imagetools inspect \
                    ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
